# MoveIt uses this configuration for controller management

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

trajectory_execution:
  allowed_start_tolerance: 0.10
  execution_duration_monitoring: False

moveit_simple_controller_manager:
  controller_names:
    - mobile_manipulation_controller
    - body_manipulation_controller
    - arm_controller

  mobile_manipulation_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - body_x
      - body_y
      - body_or
      - arm0_shoulder_yaw
      - arm0_shoulder_pitch
      - arm0_elbow_pitch
      - arm0_elbow_roll
      - arm0_wrist_pitch
      - arm0_wrist_roll
      - arm0_fingers

  body_manipulation_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: false
    joints:
      - body_height_joint
      - body_yaw_joint
      - body_pitch_joint
      - body_roll_joint
      - arm0_shoulder_yaw
      - arm0_shoulder_pitch
      - arm0_elbow_pitch
      - arm0_elbow_roll
      - arm0_wrist_pitch
      - arm0_wrist_roll

  arm_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - arm0_shoulder_yaw
      - arm0_shoulder_pitch
      - arm0_elbow_pitch
      - arm0_elbow_roll
      - arm0_wrist_pitch
      - arm0_wrist_roll
