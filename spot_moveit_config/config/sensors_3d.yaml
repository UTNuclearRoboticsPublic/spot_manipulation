sensors:
  - default_sensor
default_sensor:
  filtered_cloud_topic: spot_moveit_pointcloud
  max_range: 4.0
  max_update_rate: 1.0
  padding_offset: 0.1
  padding_scale: 1.2
  point_cloud_topic: spot_collision_cloud
  point_subsample: 5
  sensor_plugin: occupancy_map_monitor/PointCloudOctomapUpdater