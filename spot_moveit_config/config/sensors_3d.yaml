sensors:
  - velodyne
  - hand_depth
  - frontleft_depth
  - frontright_depth

velodyne:
  point_cloud_topic: /velodyne_points
  max_range: 4.0
  max_update_rate: 1.0
  padding_offset: 0.15
  padding_scale: 1.4
  point_subsample: 1
  filtered_cloud_topic: spot_moveit_pointcloud
  sensor_plugin: occupancy_map_monitor/PointCloudOctomapUpdater

hand_depth:
  sensor_plugin: occupancy_map_monitor/DepthImageOctomapUpdater
  image_topic: /spot_image_server/depth/hand_rgb/image
  queue_size: 5
  near_clipping_plane_distance: 0.3
  far_clipping_plane_distance: 5.0
  shadow_threshold: 0.2
  padding_scale: 1.0
  max_update_rate: 1.0
  filtered_cloud_topic: /spot_image_server/depth/hand_rgb/image/filtered_points

frontleft_depth:
  sensor_plugin: occupancy_map_monitor/DepthImageOctomapUpdater
  image_topic: /spot_image_server/depth/frontleft/image
  queue_size: 5
  near_clipping_plane_distance: 0.3
  far_clipping_plane_distance: 5.0
  shadow_threshold: 0.2
  padding_scale: 1.0
  max_update_rate: 1.0
  filtered_cloud_topic: /spot_image_server/depth/frontleft/image/filtered_points

frontright_depth:
  sensor_plugin: occupancy_map_monitor/DepthImageOctomapUpdater
  image_topic: /spot_image_server/depth/frontright/image
  queue_size: 5
  near_clipping_plane_distance: 0.3
  far_clipping_plane_distance: 5.0
  shadow_threshold: 0.2
  padding_scale: 1.0
  max_update_rate: 1.0
  filtered_cloud_topic: /spot_image_server/depth/frontleft/image/filtered_points
