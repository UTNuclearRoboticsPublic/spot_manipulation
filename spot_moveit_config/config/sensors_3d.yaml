sensors:
  - velodyne
  - arm_cam

velodyne:
  point_cloud_topic: /velodyne_points
  max_range: 10.0
  max_update_rate: 1.0
  padding_offset: 0.1
  padding_scale: 1.2
  point_subsample: 1
  filtered_cloud_topic: spot_moveit_pointcloud
  sensor_plugin: occupancy_map_monitor/PointCloudOctomapUpdater

arm_cam:
  point_cloud_topic: /hand_points_texture
  max_range: 2.0
  max_update_rate: 1.0
  padding_offset: 0.1
  padding_scale: 3.0
  point_subsample: 1
  filtered_cloud_topic: spot_cam_pointcloud
  sensor_plugin: occupancy_map_monitor/PointCloudOctomapUpdater
