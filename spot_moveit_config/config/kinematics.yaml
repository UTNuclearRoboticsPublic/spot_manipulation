arm_with_body:
  joints: 
    - body_height_joint
    - body_yaw_joint
    - body_pitch_joint
    - body_roll_joint
  body_height_joint.weight: 0.5
  body_yaw_joint.weight: 0.1
  body_pitch_joint.weight: 0.025
  body_roll_joint.weight: 0.1
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.005

arm:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.005